<!DOCTYPE html>
<html>
<head>
    <title>Car Rental System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚗 Car Rental System</h1>

    <input type="text"
           id="search"
           placeholder="🔍 Search Car"
           onkeyup="searchCar()">

    <div class="car-list">

        <div class="car-card">
            <div class="car-icon">🚗</div>
            <h2>Swift Dzire</h2>
            <p>₹1200 / Day</p>
            <button onclick="bookCar('Swift Dzire')">
                Book Now
            </button>
        </div>

        <div class="car-card">
            <div class="car-icon">🚙</div>
            <h2>Hyundai Creta</h2>
            <p>₹2500 / Day</p>
            <button onclick="bookCar('Hyundai Creta')">
                Book Now
            </button>
        </div>

        <div class="car-card">
            <div class="car-icon">🚘</div>
            <h2>Honda City</h2>
            <p>₹1800 / Day</p>
            <button onclick="bookCar('Honda City')">
                Book Now
            </button>
        </div>

        <div class="car-card">
            <div class="car-icon">🛻</div>
            <h2>Mahindra Thar</h2>
            <p>₹3000 / Day</p>
            <button onclick="bookCar('Mahindra Thar')">
                Book Now
            </button>
        </div>

    </div>

    <div class="booking-section">

        <h2>📋 Booking Details</h2>

        <input type="text"
               id="customerName"
               placeholder="Enter Customer Name">

        <input type="text"
               id="selectedCar"
               placeholder="Selected Car"
               readonly>

        <button onclick="confirmBooking()">
            Confirm Booking
        </button>

    </div>

    <div class="contact">
        <h2>📞 Contact</h2>
        <p>Developer: Rani Patil</p>
        <p>Phone: +91 8867552894</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
