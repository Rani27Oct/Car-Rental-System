<!DOCTYPE html>
<html>
<head>
    <title>Car Rental System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚗 Car Rental System</h1>

    <div class="car-list">

        <div class="car-card">
            <img src="https://via.placeholder.com/300x180?text=Swift+Dzire">
            <h2>Swift Dzire</h2>
            <p>₹1200 / Day</p>
            <button onclick="bookCar('Swift Dzire')">Book Now</button>
        </div>

        <div class="car-card">
            <img src="https://via.placeholder.com/300x180?text=Hyundai+Creta">
            <h2>Hyundai Creta</h2>
            <p>₹2500 / Day</p>
            <button onclick="bookCar('Hyundai Creta')">Book Now</button>
        </div>

        <div class="car-card">
            <img src="https://via.placeholder.com/300x180?text=Honda+City">
            <h2>Honda City</h2>
            <p>₹1800 / Day</p>
            <button onclick="bookCar('Honda City')">Book Now</button>
        </div>

        <div class="car-card">
            <img src="https://via.placeholder.com/300x180?text=Mahindra+Thar">
            <h2>Mahindra Thar</h2>
            <p>₹3000 / Day</p>
            <button onclick="bookCar('Mahindra Thar')">Book Now</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
